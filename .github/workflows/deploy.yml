name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Detectar qué cambió para no redeplegar lo que no hace falta
  # ────────────────────────────────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'web/app.py'
              - 'web/pdf_generator.py'
              - 'requirements.txt'
              - 'deploy.sh'
              - 'sql/**'
              - 'elt_load.py'
              - 'airflow/dags/**'
            frontend:
              - 'web/frontend/src/**'
              - 'web/frontend/public/**'
              - 'web/frontend/package*.json'
              - 'web/frontend/vite.config.js'
              - 'web/frontend/vercel.json'

  # ────────────────────────────────────────────────────────────────────────────
  # Backend: solo si cambiaron archivos del servidor
  # ────────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (VPS)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    outputs:
      dashboard_url: ${{ steps.get_urls.outputs.dashboard_url }}
      airflow_url:   ${{ steps.get_urls.outputs.airflow_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Pull + restart backend services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 12m
          script: |
            set -e
            cd /home/ubuntu/datamart-sis
            git fetch origin main
            git reset --hard origin/main
            source .venv/bin/activate
            pip install -r requirements.txt -q
            pkill -9 -f 'uvicorn app:app' 2>/dev/null || true
            sleep 2
            cd web
            DATABASE_URL='${{ secrets.DATABASE_URL }}' \
            PYTHONUNBUFFERED=1 nohup uvicorn app:app \
              --host 0.0.0.0 --port 8080 --workers 1 \
              >> /home/ubuntu/web.log 2>&1 &
            echo "Backend redeployado (solo uvicorn) — PID $!"

      - name: Read public URLs
        id: get_urls
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" > /tmp/vps_key
          chmod 600 /tmp/vps_key
          SSH="ssh -i /tmp/vps_key -o StrictHostKeyChecking=no ubuntu@${{ secrets.VPS_HOST }}"
          for i in 1 2 3 4 5; do
            DASH=$($SSH "cat /home/ubuntu/public_url.txt 2>/dev/null || echo ''" | tr -d '\r\n')
            AF=$($SSH "cat /home/ubuntu/airflow_url.txt 2>/dev/null || echo ''" | tr -d '\r\n')
            if [[ "$DASH" == https://* ]]; then
              echo "dashboard_url=$DASH" >> "$GITHUB_OUTPUT"
              echo "airflow_url=$AF"     >> "$GITHUB_OUTPUT"
              break
            fi
            sleep 10
          done
          rm -f /tmp/vps_key

  # ────────────────────────────────────────────────────────────────────────────
  # Frontend: Vercel lo maneja automáticamente al recibir el push.
  # Este job solo ejecuta los tests post-deploy y crea el Release.
  # ────────────────────────────────────────────────────────────────────────────
  verify-and-release:
    name: Verify + Release
    needs: [changes, deploy-backend]
    # Corre si hubo cambio de backend O de frontend
    if: always() && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Si backend cambió usa la URL del job; si solo frontend cambió usa la del repo
      DASH_URL: ${{ needs.deploy-backend.outputs.dashboard_url || 'https://datamart-sis.vercel.app' }}
      AF_URL:   ${{ needs.deploy-backend.outputs.airflow_url }}
      GH_TOKEN: ${{ secrets.GH_PAT }}
    steps:
      - uses: actions/checkout@v4

      - name: Smoke test dashboard
        run: |
          URL="${{ env.DASH_URL }}"
          for i in 1 2 3; do
            HTTP=$(curl -s -o /dev/null -w '%{http_code}' -L --max-time 25 "$URL" || echo "000")
            [ "$HTTP" = "200" ] && echo "OK: $URL" && break
            echo "Intento $i: HTTP $HTTP"; sleep 15
          done
          if echo "$HTTP" | grep -qE '^5|^000'; then
            echo "QUALITY GATE FAILED: $URL returned $HTTP"; exit 1
          fi

      - name: Run module tests
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test deps + run tests
        run: |
          pip install -r tests/requirements-test.txt
          pytest tests/test_dashboard_modules.py \
            --base-url "${{ env.DASH_URL }}" \
            -v --tb=short --timeout=30


      - name: Deploy to Vercel (frontend)
        if: needs.changes.outputs.frontend == 'true' && env.VERCEL_TOKEN != ''
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel@latest --quiet
          cd web/frontend
          npm ci --legacy-peer-deps --quiet
          npm run build
          vercel --prod --yes --token "$VERCEL_TOKEN" 2>&1 | tail -5
          # Reasignar alias de produccion al nuevo deployment
          TEAM="$VERCEL_ORG_ID"
          PROJ="$VERCEL_PROJECT_ID"
          DEPLOY_ID=$(curl -s \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=${PROJ}&teamId=${TEAM}&limit=1&target=production" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['deployments'][0]['uid'])")
          echo "Asignando aliases a $DEPLOY_ID"
          for ALIAS in datamart-sis.vercel.app datamart-sis-peru.vercel.app; do
            curl -s -X POST \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"alias\":\"${ALIAS}\"}" \
              "https://api.vercel.com/v2/deployments/${DEPLOY_ID}/aliases?teamId=${TEAM}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print('  ->', d.get('alias','?'), d.get('error','OK'))"
          done

      - name: Create Release
        run: |
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          TAG="deploy-$(date -u '+%Y%m%d-%H%M')"
          CHANGED="${{ needs.changes.outputs.backend == 'true' && 'Backend+Frontend' || 'Frontend only (Vercel)' }}"
          printf 'DataMart SIS - %s\n\nCambios: %s\nDashboard: %s\nAirflow: %s\nCommit: %s\n' \
            "$DATE" "$CHANGED" "${{ env.DASH_URL }}" "${{ env.AF_URL }}" \
            "$(echo ${{ github.sha }} | cut -c1-7)" > /tmp/rn.md
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Deploy $DATE — $CHANGED" \
            --notes-file /tmp/rn.md --latest \
            || echo "Release ya existe"

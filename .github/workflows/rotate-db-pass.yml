name: Rotate DB password (one-shot)
on:
  workflow_dispatch:

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnóstico de volúmenes Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 1m
          script: |
            echo "=== Volúmenes Docker ==="
            docker volume ls
            echo "=== Tamaño de cada volumen con datos de postgres ==="
            docker volume ls --format '{{.Name}}' | grep -i "pg\|postgres\|data" | while read v; do
              SIZE=$(docker run --rm -v "$v":/data alpine du -sh /data 2>/dev/null | cut -f1)
              echo "$v → $SIZE"
            done

      - name: Actualizar DATABASE_URL en GitHub Secrets
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh secret set DATABASE_URL \
            --repo ${{ github.repository }} \
            --body "postgresql://datamart:${{ secrets.DB_NEW_PASS }}@${{ secrets.VPS_HOST }}:5433/datamart_sis"

      - name: Limpiar secreto temporal
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh secret delete DB_NEW_PASS --repo ${{ github.repository }}

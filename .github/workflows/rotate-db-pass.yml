name: Rotate DB password (one-shot)
on:
  workflow_dispatch:

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - name: Cambiar contraseña en PostgreSQL
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 2m
          script: |
            echo "=== Docker containers ==="
            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}" 2>/dev/null || echo "docker not available"
            echo "=== Processes on port 5433 ==="
            ss -tlnp | grep 5433 || true
            echo "=== psql available? ==="
            which psql 2>/dev/null || echo "psql not in PATH"

      - name: Actualizar DATABASE_URL en GitHub Secrets
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh secret set DATABASE_URL \
            --repo ${{ github.repository }} \
            --body "postgresql://datamart:${{ secrets.DB_NEW_PASS }}@${{ secrets.VPS_HOST }}:5433/datamart_sis"

      - name: Limpiar secreto temporal
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh secret delete DB_NEW_PASS --repo ${{ github.repository }}

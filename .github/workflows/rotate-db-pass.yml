name: Rotate DB password (one-shot)
on:
  workflow_dispatch:

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - name: Cambiar contraseña en PostgreSQL
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 2m
          script: |
            echo "=== All docker containers (including stopped) ==="
            docker ps -a --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}" 2>/dev/null || echo "docker not available"
            echo "=== All listening ports ==="
            ss -tlnp
            echo "=== postgres processes ==="
            ps aux | grep -i postgres | grep -v grep || echo "no postgres processes"
            echo "=== systemd postgres service ==="
            systemctl status postgresql 2>&1 | head -5 || true
            echo "=== home dir contents ==="
            ls /home/ubuntu/
            echo "=== docker compose files ==="
            find /home/ubuntu -name "docker-compose*.yml" 2>/dev/null | head -5

      - name: Actualizar DATABASE_URL en GitHub Secrets
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh secret set DATABASE_URL \
            --repo ${{ github.repository }} \
            --body "postgresql://datamart:${{ secrets.DB_NEW_PASS }}@${{ secrets.VPS_HOST }}:5433/datamart_sis"

      - name: Limpiar secreto temporal
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh secret delete DB_NEW_PASS --repo ${{ github.repository }}

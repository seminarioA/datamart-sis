# Airflow standalone — se levanta aparte del docker-compose principal.
# Usa la misma red que el contenedor de PostgreSQL.
#
# Uso:
#   docker compose -f docker-compose-airflow.yml up -d
#   # Crear usuario admin la primera vez:
#   docker exec -it airflow-webserver airflow users create \
#     --username admin --password admin \
#     --firstname Alejandro --lastname Seminario \
#     --role Admin --email alesuperbros23@gmail.com
#
# UI disponible en http://localhost:8082 (o via cloudflared)

services:
  airflow-db-init:
    image: apache/airflow:2.9.3
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://datamart:FTNIdAQSBTZ5zloaSGl11L4@datamart-sis-postgres:5432/datamart_sis
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "sis-datamart-secret-2024"
    entrypoint: airflow db migrate
    networks: [sis-net]

  airflow-webserver:
    image: apache/airflow:2.9.3
    restart: unless-stopped
    depends_on: [airflow-db-init]
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://datamart:FTNIdAQSBTZ5zloaSGl11L4@datamart-sis-postgres:5432/datamart_sis
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "sis-datamart-secret-2024"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - /home/ubuntu/datamart-sis:/home/ubuntu/datamart-sis:ro
    ports:
      - "8082:8080"
    command: webserver
    networks: [sis-net]

  airflow-scheduler:
    image: apache/airflow:2.9.3
    restart: unless-stopped
    depends_on: [airflow-db-init]
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://datamart:FTNIdAQSBTZ5zloaSGl11L4@datamart-sis-postgres:5432/datamart_sis
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "sis-datamart-secret-2024"
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - /home/ubuntu/datamart-sis:/home/ubuntu/datamart-sis
    command: scheduler
    networks: [sis-net]

volumes:
  airflow-logs:

networks:
  sis-net:
    external: true
    name: docker_sis-net   # misma red que el postgres principal

# Airflow se ejecuta via pip (no Docker) en este VPS.
# Metadata DB: PostgreSQL (airflow_db en el mismo contenedor que el datamart).
# Executor: LocalExecutor (permite paralelismo, requiere PostgreSQL).
#
# Para levantar en servidores con más recursos via Docker:
#   docker compose -f docker-compose-airflow.yml up -d

services:
  airflow-webserver:
    image: apache/airflow:2.9.3
    restart: unless-stopped
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://datamart:${AIRFLOW_DB_PASSWORD}@postgres:5432/airflow_db
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "sis-datamart-2024"
      AIRFLOW__WEBSERVER__WORKERS: "2"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin2024
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
    ports:
      - "8082:8080"
    command: webserver
    depends_on:
      - airflow-scheduler

  airflow-scheduler:
    image: apache/airflow:2.9.3
    restart: unless-stopped
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://datamart:${AIRFLOW_DB_PASSWORD}@postgres:5432/airflow_db
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "sis-datamart-2024"
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
    command: scheduler

volumes:
  airflow-logs:

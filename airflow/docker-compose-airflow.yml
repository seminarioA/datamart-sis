# NOTA: Airflow se ejecuta via pip (no Docker) en este VPS por limitaciones de RAM.
# Para ambientes con >2GB RAM, puedes usar este compose con Docker.
# Ver airflow/README.md para instrucciones de arranque.
#
# Para correr con Docker en un servidor con más recursos:
#   docker compose -f docker-compose-airflow.yml up -d

services:
  airflow-webserver:
    image: apache/airflow:2.9.3
    restart: unless-stopped
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "sis-datamart-2024"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin2024
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow-data:/opt/airflow
    ports:
      - "8082:8080"
    command: standalone

volumes:
  airflow-data:
